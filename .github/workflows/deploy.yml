name: Build & Deploy

# Builds on every push/PR for verification, and deploys to GitHub Pages
# only when changes land on `main`.
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

# Least-privilege token scopes required by the Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; cancel superseded in-progress runs.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        # Project Pages are served from /<repo>/, so the base path must match
        # the repository name. ${{ github.event.repository.name }} resolves it.
        env:
          VITE_BASE: "/${{ github.event.repository.name }}/"
        run: npm run build

      - name: Upload Pages artifact
        # Only publish the artifact for deployable pushes to main.
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    # Runs only after a successful build on main.
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
